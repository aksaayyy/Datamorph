name: Release Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary-name: datamorph-linux-amd64
          - os: macos-14  # Apple Silicon
            target: aarch64-apple-darwin
            binary-name: datamorph-macos-arm64
          - os: macos-13  # Intel macOS
            target: x86_64-apple-darwin
            binary-name: datamorph-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: datamorph-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.target }}
          # Copy to release directory with platform-specific name
          mkdir -p release
          cp "target/${{ matrix.target }}/release/datamorph${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}" "release/${{ matrix.binary-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary-name }}
          path: release/${{ matrix.binary-name }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          mkdir -p release
          for artifact in artifacts/*/; do
            cp "$artifact" release/
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
